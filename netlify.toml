[build]
  publish = "dist"
  command = "npm run build:web"

# 1. استثناء ملفات Expo من التوجيه لـ index.html (يجب أن تكون قبل القاعدة العامة)
[[redirects]]
  from = "/_expo/*"
  to = "/_expo/:splat"
  status = 200
  force = true

# 2. القاعدة العامة للتطبيقات أحادية الصفحة
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 3. تحديد أنواع الملفات لضمان عدم حدوث خطأ MIME
[[headers]]
  for = "/_expo/static/js/web/*.js"
  [headers.values]
    Content-Type = "application/javascript"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"